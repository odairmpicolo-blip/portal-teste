<!DOCTYPE html>
<html lang="pt-BR">

<title>Lançamento Folha de Serviços - CIOP / TCGL</title>
<script>
window.logout = function() {
    if (confirm('Deseja sair?')) window.location.href = '../index.html';
};
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #f5f7fb; padding: 20px; }
.header { background: white; padding: 20px; margin-bottom: 20px; text-align: center; }
.container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
th { background: #06245c; color: white; }
input, select, textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
button { padding: 10px 20px; background: #06245c; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
button:hover { background: #0b3a8a; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
.msg { padding: 10px; margin: 10px 0; border-radius: 4px; display: none; }
.msg.ok { background: #d1fae5; color: #065f46; display: block; }
.msg.erro { background: #fee2e2; color: #991b1b; display: block; }
</style>
</head>
