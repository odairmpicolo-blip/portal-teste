    <script>
        window.portalMostrarCarregando = function(msg) { console.log('Carregando:', msg); };
        window.portalOcultarCarregando = function() { console.log('Concluído'); };
        window.portalAguardarUsuario = function(callback) {
            setTimeout(function() {
                var user = document.getElementById('usuarioLogado');
                var perfil = document.getElementById('perfilUsuario');
                if (user) user.textContent = 'Usuário';
                if (perfil) perfil.textContent = 'Operador';
                if (callback) callback();
            }, 100);
        };
        window.logout = function() {
            if (confirm('Deseja sair?')) window.location.href = '../index.html';
        };
    </script>
