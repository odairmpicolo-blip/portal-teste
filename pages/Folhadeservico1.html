    <!-- TRATAMENTO DE ERRO PARA SCRIPTS EXTERNOS -->
    <script>
        // Define funções padrão caso os scripts externos falhem
        window.portalMostrarCarregando = window.portalMostrarCarregando || function(msg) {
            console.log('Carregando:', msg);
        };
        window.portalOcultarCarregando = window.portalOcultarCarregando || function() {
            console.log('Carregamento concluído');
            document.documentElement.classList.remove('portal-auth-pending');
        };
        window.portalAguardarUsuario = window.portalAguardarUsuario || function(callback) {
            document.documentElement.classList.remove('portal-auth-pending');
            setTimeout(() => {
                const usuarioEl = document.getElementById('usuarioLogado');
                const perfilEl = document.getElementById('perfilUsuario');
                if (usuarioEl) usuarioEl.textContent = 'Usuário Sistema';
                if (perfilEl) perfilEl.textContent = 'Operador';
                if (typeof callback === 'function') callback();
            }, 100);
        };
        window.logout = window.logout || function() {
            if (confirm('Deseja realmente sair?')) {
                window.location.href = '../index.html';
            }
        };
        
        // Tratamento global de erros de carregamento de scripts
        window.addEventListener('error', function(e) {
            if (e.target && e.target.tagName === 'SCRIPT') {
                console.warn('Falha ao carregar script:', e.target.src);
                // Remove o bloqueio visual
                document.documentElement.classList.remove('portal-auth-pending');
            }
        }, true);
        
        // Fallback de timeout para remover bloqueio
        setTimeout(function() {
            document.documentElement.classList.remove('portal-auth-pending');
        }, 3000);
    </script>
