name: Importar terminais Firestore

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  importar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Instalar dependências
        run: npm ci

      - name: Importar terminais
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ runner.temp }}/firebase-sa.json
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "Configure o secret FIREBASE_SERVICE_ACCOUNT."
            exit 1
          fi
          printf '%s' "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > "$FIREBASE_SERVICE_ACCOUNT"
          npm run import-terminais-firestore
