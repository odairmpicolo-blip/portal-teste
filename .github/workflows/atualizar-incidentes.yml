name: Atualizar incidentes TCGL

# portal-teste: TCGL → JSON no git (incremental: novos + estado).
# Janela 04:48–01:28 BRT, a cada 1h02. Silêncio: 01:30–04:48.

on:
  schedule:
    - cron: "48 4 * * *"
      timezone: America/Sao_Paulo
    - cron: "50 5 * * *"
      timezone: America/Sao_Paulo
    - cron: "52 6 * * *"
      timezone: America/Sao_Paulo
    - cron: "54 7 * * *"
      timezone: America/Sao_Paulo
    - cron: "56 8 * * *"
      timezone: America/Sao_Paulo
    - cron: "58 9 * * *"
      timezone: America/Sao_Paulo
    - cron: "0 11 * * *"
      timezone: America/Sao_Paulo
    - cron: "2 12 * * *"
      timezone: America/Sao_Paulo
    - cron: "4 13 * * *"
      timezone: America/Sao_Paulo
    - cron: "6 14 * * *"
      timezone: America/Sao_Paulo
    - cron: "8 15 * * *"
      timezone: America/Sao_Paulo
    - cron: "10 16 * * *"
      timezone: America/Sao_Paulo
    - cron: "12 17 * * *"
      timezone: America/Sao_Paulo
    - cron: "14 18 * * *"
      timezone: America/Sao_Paulo
    - cron: "16 19 * * *"
      timezone: America/Sao_Paulo
    - cron: "18 20 * * *"
      timezone: America/Sao_Paulo
    - cron: "20 21 * * *"
      timezone: America/Sao_Paulo
    - cron: "22 22 * * *"
      timezone: America/Sao_Paulo
    - cron: "24 23 * * *"
      timezone: America/Sao_Paulo
    - cron: "26 0 * * *"
      timezone: America/Sao_Paulo
    - cron: "28 1 * * *"
      timezone: America/Sao_Paulo
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Atualizar incidentes TCGL
        env:
          CIOP_INCIDENTES_USUARIO: ${{ secrets.CIOP_INCIDENTES_USUARIO }}
          CIOP_INCIDENTES_SENHA: ${{ secrets.CIOP_INCIDENTES_SENHA }}
          CIOP_INCIDENTES_RETRIES: "3"
          CIOP_INCIDENTES_TIMEOUT_MS: "15000"
          PORTAL_ROOT: ${{ github.workspace }}
        run: node scripts/atualizar-incidentes-tcgl.mjs

      - name: Publicar dados atualizados
        run: bash scripts/ci-git-commit-push.sh "Atualiza incidentes TCGL" assets/data/incidentes-tcgl.json
