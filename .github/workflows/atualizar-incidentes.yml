name: Atualizar incidentes TCGL

# portal-teste: busca TCGL e publica JSON (legado / backup).
# Fonte principal: DSQL → exportar-incidentes-dsql.yml (a cada 30 min).
# Import DSQL: somente portalCIOP (atualizar-incidentes.yml).

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Atualizar incidentes TCGL
        env:
          CIOP_INCIDENTES_USUARIO: ${{ secrets.CIOP_INCIDENTES_USUARIO }}
          CIOP_INCIDENTES_SENHA: ${{ secrets.CIOP_INCIDENTES_SENHA }}
          PORTAL_ROOT: ${{ github.workspace }}
        run: node scripts/atualizar-incidentes-tcgl.mjs

      - name: Publicar dados atualizados
        run: bash scripts/ci-git-commit-push.sh "Atualiza incidentes TCGL" assets/data/incidentes-tcgl.json
