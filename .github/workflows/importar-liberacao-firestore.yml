name: Importar liberação Firestore

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  importar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Instalar dependências
        run: npm ci

      - name: Importar janela de liberação
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_SA_PATH: ${{ runner.temp }}/firebase-sa.json
          PORTAL_JSON_TIMEOUT_MS: 180000
        run: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "Configure o secret FIREBASE_SERVICE_ACCOUNT no repositório (JSON da service account)."
            exit 1
          fi
          printf '%s' "${FIREBASE_SERVICE_ACCOUNT_JSON}" > "${FIREBASE_SA_PATH}"
          export FIREBASE_SERVICE_ACCOUNT="${FIREBASE_SA_PATH}"
          npm run import-liberacao-firestore
