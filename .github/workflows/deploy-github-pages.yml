# Publica o portal estático no GitHub Pages (teste).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - "assets/**"
      - "app/**"
      - "portal-app/**"
      - "index.html"
      - "login.html"
      - "hosting/**"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

concurrency:
  group: github-pages-portal-teste
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Baixar portal
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: portal-app/package-lock.json

      - name: Build do app React
        run: |
          cd portal-app
          npm ci
          npm run build

      - name: Preparar site estático
        env:
          CUSTOM_DOMAIN: ${{ vars.PORTAL_CUSTOM_DOMAIN }}
          PORTAL_AWS_API_URL: ${{ secrets.PORTAL_AWS_API_URL }}
          RELATORIO_IA_SCRIPT_URL: ${{ secrets.RELATORIO_IA_SCRIPT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: sa-east-1
        run: |
          set -euo pipefail
          mkdir site
          cp index.html login.html site/
          cp -r pages assets app site/
          cp hosting/404.html site/404.html
          touch site/.nojekyll

          if [ -n "${CUSTOM_DOMAIN:-}" ]; then
            echo "$CUSTOM_DOMAIN" > site/CNAME
            echo "Domínio customizado (variável): $CUSTOM_DOMAIN"
          elif [ -f hosting/CNAME ]; then
            cp hosting/CNAME site/CNAME
            echo "Domínio customizado (hosting/CNAME): $(cat site/CNAME)"
          else
            echo "Sem CNAME — site em GitHub Pages do repositório portal-teste"
          fi

          API_URL="${PORTAL_AWS_API_URL:-}"
          if [ -z "$API_URL" ] && [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
            API_URL=$(aws cloudformation describe-stacks \
              --stack-name portal-ciop-bus2-proxy \
              --region "${AWS_REGION}" \
              --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
              --output text 2>/dev/null || true)
            if [ -n "$API_URL" ] && [ "$API_URL" != "None" ]; then
              echo "API URL obtida do stack portal-ciop-bus2-proxy"
            else
              API_URL=""
            fi
          fi

          export API_URL RELATORIO_IA_SCRIPT_URL
          node -e "
            const fs = require('fs');
            const path = 'site/assets/data/portal-runtime.json';
            const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
            const api = (process.env.API_URL || '').replace(/\\/$/, '');
            const ia = (process.env.RELATORIO_IA_SCRIPT_URL || '').trim();
            if (api) cfg.awsApiUrl = api;
            if (ia) cfg.relatorioIaScriptUrl = ia;
            delete cfg.devApiKey;
            fs.writeFileSync(path, JSON.stringify(cfg, null, 2) + '\n');
            if (api) console.log('portal-runtime.json -> awsApiUrl:', api);
            if (ia) console.log('portal-runtime.json -> relatorioIaScriptUrl:', ia);
            if (!api && !ia) console.log('portal-runtime.json mantém valores do repositório');
          "

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy_try1.outputs.page_url || steps.deploy_try2.outputs.page_url || steps.deploy_try3.outputs.page_url }}
    steps:
      - name: Publicar (tentativa 1)
        id: deploy_try1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Aguardar fila do Pages
        if: steps.deploy_try1.outcome != 'success'
        run: sleep 90

      - name: Publicar (tentativa 2)
        id: deploy_try2
        if: steps.deploy_try1.outcome != 'success'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Publicar (tentativa 3)
        id: deploy_try3
        if: steps.deploy_try1.outcome != 'success' && steps.deploy_try2.outcome != 'success'
        uses: actions/deploy-pages@v4

      - name: Falhar se nenhuma publicação concluiu
        if: steps.deploy_try1.outcome != 'success' && steps.deploy_try2.outcome != 'success' && steps.deploy_try3.outcome != 'success'
        run: exit 1
