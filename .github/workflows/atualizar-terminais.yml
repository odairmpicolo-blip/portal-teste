name: Atualizar terminais planilha

on:
  schedule:
    # A cada 5 minutos (UTC)
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar portal
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Atualizar snapshot da planilha
        env:
          PORTAL_ROOT: ${{ github.workspace }}
        run: node scripts/atualizar-terminais-planilha.mjs

      - name: Publicar dados atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza terminais agora"
          file_pattern: assets/data/terminais-agora.json

      - name: Instalar dependências
        run: npm ci

      - name: Importar terminais no Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ runner.temp }}/firebase-sa.json
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT não configurado — import Firestore ignorado."
            exit 0
          fi
          printf '%s' "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > "$FIREBASE_SERVICE_ACCOUNT"
          npm run import-terminais-firestore
